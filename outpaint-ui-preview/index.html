<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>扩图编辑 - AI 电商平台</title>
  <style>
    :root {
      --brand: #505cff;
      --brand-blue: #4b8cff;
      --page: #f7f7f8;
      --panel: #fff;
      --panel-soft: #f2f2f3;
      --text: #252632;
      --sub: #657084;
      --muted: #9aa1ad;
      --line: #e8e8ec;
      --dark: #2f3034;
      --success: #12b76a;
      --danger: #f04438;
      --shadow: 0 18px 48px rgba(24, 28, 40, .12);
      --radius: 12px;
      --source-ratio: 1;
      --target-ratio: 1;
      --source-size: 50%;
      --source-image: url("assets/main-product.jpg");
      font-family: "PingFang SC", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      color: var(--text);
      background: var(--page);
      letter-spacing: 0;
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      background: transparent;
      color: inherit;
    }

    .editor {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: 64px minmax(0, 1fr);
      background: #f7f7f8;
    }

    .global-header {
      height: 64px;
      background: #fff;
      border-bottom: 1px solid #e9ebf2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
    }

    .brand-logo {
      width: 232px;
      height: auto;
      display: block;
    }

    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 24px;
      color: #252632;
    }

    .notice {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      position: relative;
      cursor: pointer;
      padding: 0;
    }

    .notice:before {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 26px;
      height: 26px;
      background: url("assets/notification-bell.png") center / contain no-repeat;
    }

    .notice:after {
      content: "99+";
      position: absolute;
      left: 14px;
      top: 0;
      min-width: 24px;
      height: 13px;
      padding: 0 3px;
      border-radius: 10px;
      background: #ff3b30;
      color: #fff;
      font-size: 10px;
      line-height: 13px;
      text-align: center;
    }

    .header-pill {
      min-height: 36px;
      border: 1px solid #e1e1e1;
      border-radius: 20px;
      background: #fff;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 15px;
      white-space: nowrap;
    }

    .header-chevron {
      width: 7px;
      height: 7px;
      border-right: 1.7px solid #4b5565;
      border-bottom: 1.7px solid #4b5565;
      border-radius: 1.5px;
      transform: rotate(45deg);
      flex: 0 0 auto;
      margin-top: -4px;
    }

    .credit-pill {
      min-height: 36px;
      border: 0;
      border-radius: 20px;
      background: #f1f4ff;
      padding: 0 20px 0 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      white-space: nowrap;
    }

    .credit-dot {
      width: 20px;
      height: 20px;
      display: inline-block;
      background: url("assets/rongdou-credit-icon.png") center / contain no-repeat;
      flex: 0 0 auto;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: block;
      object-fit: cover;
      background: #eef1ff;
    }

    .canvas-shell {
      position: relative;
      min-height: 0;
      overflow: hidden;
      background: #f7f7f8;
    }

    .canvas {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding-bottom: 120px;
      touch-action: none;
    }

    .board-strip {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 56px;
      cursor: grab;
      transform-origin: center center;
      will-change: transform;
    }

    .board-strip.dragging {
      cursor: grabbing;
    }

    .artboard-wrap {
      position: relative;
      width: min(760px, 48vw);
      aspect-ratio: var(--target-ratio);
      transition: width .18s ease, aspect-ratio .18s ease;
    }

    .artboard-wrap.wide {
      width: min(900px, 56vw);
    }

    .artboard-wrap.tall {
      width: min(520px, 38vw);
    }

    .selection-label {
      position: absolute;
      left: 0;
      top: -30px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--brand-blue);
      font-size: 16px;
      font-weight: 600;
    }

    .selection-size {
      position: absolute;
      top: -30px;
      right: 0;
      color: var(--brand-blue);
      font-size: 16px;
      font-weight: 600;
    }

    .artboard {
      position: absolute;
      inset: 0;
      background: #fff;
      border: 2px solid var(--brand-blue);
      overflow: hidden;
      user-select: none;
    }

    .artboard.pending {
      border-style: dashed;
    }

    .artboard::before,
    .artboard::after {
      content: "";
      position: absolute;
      z-index: 4;
      background: rgba(255,255,255,.62);
      pointer-events: none;
    }

    .artboard::before {
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
    }

    .artboard::after {
      top: 0;
      left: 50%;
      height: 100%;
      width: 1px;
    }

    .expanded-bg {
      position: absolute;
      inset: 0;
      opacity: 0;
      background:
        linear-gradient(90deg, rgba(176,226,249,.84), rgba(244,251,255,.78)),
        var(--source-image) center / cover no-repeat;
      filter: blur(22px) saturate(1.05);
      transform: scale(1.14);
      transition: opacity .28s ease;
    }

    .generated .expanded-bg,
    .processing .expanded-bg {
      opacity: 1;
    }

    .source-photo {
      position: absolute;
      z-index: 3;
      left: 50%;
      top: 50%;
      width: var(--source-size);
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      background: #fff var(--source-image) center / cover no-repeat;
      box-shadow: 0 12px 30px rgba(34, 40, 56, .12);
      transition: width .18s ease, opacity .18s ease;
    }

    .generated .source-photo {
      box-shadow: none;
    }

    .source-board.generated .expanded-bg,
    .source-board.generated .outpaint-mask {
      opacity: 0;
    }

    .source-board.generated .source-photo {
      box-shadow: 0 12px 30px rgba(34, 40, 56, .12);
    }

    .outpaint-mask {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0;
      background: linear-gradient(90deg, rgba(235,235,235,.2), rgba(198,198,198,.78));
      transition: opacity .18s ease;
    }

    .processing .outpaint-mask {
      opacity: .82;
    }

    .processing-badge {
      position: absolute;
      right: 110px;
      bottom: 42px;
      z-index: 8;
      display: none;
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(42,43,48,.32);
      color: #fff;
      font-size: 16px;
      font-weight: 650;
      backdrop-filter: blur(6px);
    }

    .processing .processing-badge {
      display: block;
    }

    .handle {
      position: absolute;
      z-index: 8;
      width: 12px;
      height: 12px;
      border: 2px solid var(--brand-blue);
      background: #fff;
    }

    .handle.lt { left: -7px; top: -7px; }
    .handle.rt { right: -7px; top: -7px; }
    .handle.lb { left: -7px; bottom: -7px; }
    .handle.rb { right: -7px; bottom: -7px; }
    .handle.tm { left: 50%; top: -7px; transform: translateX(-50%); }
    .handle.bm { left: 50%; bottom: -7px; transform: translateX(-50%); }
    .handle.lm { left: -7px; top: 50%; transform: translateY(-50%); }
    .handle.rm { right: -7px; top: 50%; transform: translateY(-50%); }

    .right-rail {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      gap: 14px;
      z-index: 12;
    }

    .rail-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      box-shadow: 0 10px 30px rgba(30,34,44,.08);
      color: #3e4046;
      font-size: 22px;
    }

    .rail-btn.active {
      color: #fff;
      background: radial-gradient(circle at 70% 20%, #5bb6ff, var(--brand));
      box-shadow: 0 0 0 8px rgba(80,92,255,.12), 0 10px 30px rgba(80,92,255,.22);
    }

    .return-btn {
      position: absolute;
      left: 24px;
      top: 22px;
      z-index: 17;
      height: 38px;
      padding: 0 16px;
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid #e5e7ef;
      box-shadow: 0 8px 24px rgba(24, 28, 40, .08);
      color: #252632;
      font-size: 14px;
      font-weight: 700;
    }

    .return-btn:hover {
      color: var(--brand);
      border-color: rgba(80, 92, 255, .28);
      background: #f7f8ff;
    }

    .return-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
      flex: 0 0 auto;
      background: url("assets/back-icon.png") center / 18px 18px no-repeat;
    }

    .bottom-left {
      position: absolute;
      left: 42px;
      bottom: 28px;
      display: flex;
      align-items: center;
      color: #8b8d94;
      font-size: 15px;
      font-weight: 600;
    }

    .tool-dock {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 16;
      display: flex;
      align-items: center;
      background: #fff;
      box-shadow: 0 8px 30px rgba(27, 31, 42, .12);
      border: 1px solid rgba(0,0,0,.04);
      overflow: hidden;
    }

    .tool-dock {
      bottom: 28px;
      height: 62px;
      border-radius: 18px;
      gap: 8px;
      padding: 8px;
    }

    .dock-btn {
      min-width: 126px;
      height: 42px;
      border-radius: 11px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: #3e4046;
      font-size: 16px;
      font-weight: 700;
    }

    .dock-btn:hover {
      background: #F5F6FA;
    }

    .dock-btn.active {
      color: #fff;
      background: #2f3034;
    }

    .dock-btn.active:hover {
      background: #2f3034;
    }

    .dock-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: inline-block;
      background-position: center;
      background-repeat: no-repeat;
      background-size: 20px 20px;
    }

    .outpaint-dock-icon {
      background-image: url("assets/outpaint-icon.png");
    }

    .dock-btn.active .outpaint-dock-icon {
      background-image: url("assets/outpaint-icon-active.png");
    }

    .upload-dock-icon {
      background-image: url("assets/upload-icon.png");
    }

    .dock-btn.active .upload-dock-icon {
      background-image: url("assets/upload-icon-active.png");
    }

    .download-dock-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: inline-block;
      background: url("assets/download-icon.png") center / 20px 20px no-repeat;
    }

    .outpaint-panel {
      position: absolute;
      z-index: 18;
      right: 24px;
      top: 86px;
      bottom: 104px;
      width: 336px;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 14px 36px rgba(24,28,40,.12);
      padding: 14px 14px 12px;
      display: none;
      gap: 10px;
      overflow: auto;
    }

    .outpaint-panel.show {
      display: grid;
    }

    .outpaint-panel h2 {
      margin: 0;
      font-size: 15px;
      line-height: 20px;
      font-weight: 800;
    }

    .form-block {
      display: grid;
      gap: 6px;
    }

    .form-label {
      color: #7c7f89;
      font-size: 14px;
      line-height: 20px;
    }

    .preset-row {
      display: grid;
      gap: 16px;
    }

    .select-wrap,
    .input-wrap {
      position: relative;
      height: 36px;
      border-radius: 8px;
      background: #f2f2f3;
      display: flex;
      align-items: center;
    }

    .select-wrap select {
      width: 100%;
      height: 36px;
      border: 0;
      appearance: none;
      outline: 0;
      background: transparent;
      padding: 0 36px 0 12px;
      font-size: 14px;
      color: #222328;
      cursor: pointer;
    }

    .select-wrap::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 13px;
      width: 7px;
      height: 7px;
      border-right: 1.6px solid #7c7f89;
      border-bottom: 1.6px solid #7c7f89;
      transform: rotate(45deg);
      pointer-events: none;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 20px 1fr;
      gap: 10px;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      height: 36px;
      border: 0;
      outline: 0;
      background: transparent;
      padding: 0 12px;
      font-size: 14px;
      color: #222328;
    }

    .times {
      color: #a2a4aa;
      text-align: center;
      font-size: 18px;
    }

    .size-row {
      display: grid;
      grid-template-columns: 1fr 1fr 36px;
      gap: 8px;
      align-items: center;
    }

    .size-input {
      height: 36px;
      border-radius: 8px;
      background: #f2f2f3;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      min-width: 0;
    }

    .size-input span {
      flex: 0 0 auto;
      color: #7c7f89;
      font-size: 14px;
      font-weight: 650;
    }

    .size-input input {
      width: 100%;
      min-width: 0;
      height: 32px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #222328;
      font-size: 14px;
    }

    .ratio-lock {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f2f2f3 url("assets/ratio-unlinked.png") center / 18px 18px no-repeat;
      border: 1px solid transparent;
    }

    .ratio-lock.active {
      background: #eef5ff url("assets/ratio-linked.png") center / 18px 18px no-repeat;
      border-color: rgba(75, 140, 255, .38);
    }

    .ratio-list {
      display: grid;
      gap: 6px;
      padding: 0;
    }

    .ratio-option {
      min-height: 24px;
      display: grid;
      grid-template-columns: 30px 1fr 22px;
      align-items: center;
      gap: 10px;
      color: #222328;
      font-size: 14px;
      line-height: 20px;
      text-align: left;
    }

    .ratio-option .selected-mark {
      justify-self: end;
      color: var(--brand);
      font-size: 14px;
      opacity: 0;
    }

    .ratio-option.active .selected-mark {
      opacity: 1;
    }

    .ratio-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #f0f0f1;
      display: grid;
      place-items: center;
    }

    .ratio-icon i {
      display: block;
      width: 14px;
      height: 14px;
      border: 1.6px solid #767982;
      border-radius: 3px;
    }

    .ratio-option[data-ratio="original"] .ratio-icon i {
      width: 14px;
      height: 14px;
      border-style: dashed;
    }

    .ratio-option[data-ratio="3:4"] .ratio-icon i,
    .ratio-option[data-ratio="2:3"] .ratio-icon i,
    .ratio-option[data-ratio="9:16"] .ratio-icon i,
    .ratio-option[data-ratio="4:5"] .ratio-icon i {
      width: 14px;
      height: 18px;
    }

    .ratio-option[data-ratio="9:16"] .ratio-icon i {
      width: 10px;
      height: 19px;
    }

    .ratio-option[data-ratio="4:3"] .ratio-icon i,
    .ratio-option[data-ratio="3:2"] .ratio-icon i,
    .ratio-option[data-ratio="16:9"] .ratio-icon i,
    .ratio-option[data-ratio="5:4"] .ratio-icon i {
      width: 19px;
      height: 12px;
    }

    .ratio-option[data-ratio="16:9"] .ratio-icon i {
      width: 20px;
      height: 10px;
    }

    .ratio-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 42px;
      color: #646773;
      font-size: 15px;
    }

    .mini-frame {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: #f2f2f3;
      display: grid;
      place-items: center;
    }

    .mini-frame i {
      width: 20px;
      height: 20px;
      border: 2px solid #a0a3ab;
      border-radius: 4px;
      display: block;
    }

    .panel-actions {
      position: sticky;
      bottom: -12px;
      margin: 0 -14px -12px;
      padding: 10px 14px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      background: linear-gradient(180deg, rgba(255,255,255,.88), #fff 28%);
      border-top: 1px solid #f0f1f5;
    }

    .btn {
      height: 40px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      background: #fff;
      border: 1px solid #e3e4e9;
      color: #27282d;
    }

    .btn.primary {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
      box-shadow: 0 8px 22px rgba(80, 92, 255, 0.18);
    }

    .btn.primary:disabled {
      color: #a9abb2;
      background: #efeff1;
      border-color: #efeff1;
      cursor: not-allowed;
    }

    .floating-menu {
      position: absolute;
      z-index: 28;
      display: none;
      width: 236px;
      border-radius: 14px;
      padding: 8px;
      background: #fff;
      box-shadow: 0 18px 48px rgba(24, 28, 40, .18);
      border: 1px solid rgba(0,0,0,.05);
    }

    .floating-menu.show {
      display: block;
    }

    .menu-item {
      width: 100%;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      font-size: 16px;
      color: #303138;
      text-align: left;
    }

    .menu-item:hover {
      background: #f1f1f3;
    }

    .menu-icon {
      width: 22px;
      text-align: center;
      color: #575a63;
    }

    .toast {
      position: fixed;
      right: 28px;
      bottom: 28px;
      z-index: 40;
      display: none;
      max-width: 360px;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(47,48,52,.92);
      color: #fff;
      font-size: 15px;
      box-shadow: 0 14px 34px rgba(24,28,40,.2);
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 1180px) {
      .outpaint-panel {
        right: 24px;
        top: 86px;
        bottom: 104px;
      }

      .artboard-wrap {
        width: min(680px, 62vw);
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      .editor {
        min-height: 100vh;
        height: auto;
        grid-template-rows: auto 720px;
      }

      .global-header {
        padding: 12px;
        height: auto;
        gap: 10px;
        align-items: flex-start;
        flex-direction: column;
      }

      .brand-logo {
        width: min(232px, 58vw);
      }

      .header-actions {
        width: 100%;
        gap: 10px;
        justify-content: flex-end;
      }

      .notice {
        display: none;
      }

      .artboard-wrap,
      .artboard-wrap.wide,
      .artboard-wrap.tall {
        width: 78vw;
      }

      .outpaint-panel {
        left: 12px;
        right: 12px;
        top: 86px;
        bottom: 92px;
        width: auto;
      }

      .return-btn {
        left: 12px;
        top: 12px;
      }

      .right-rail {
        display: none;
      }

      .tool-dock {
        width: calc(100vw - 24px);
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="editor">
    <header class="global-header">
      <div class="brand"><img class="brand-logo" src="assets/carter-ai-logo.png" alt="卡特加特 AI"></div>
      <div class="header-actions">
        <button class="notice" type="button" aria-label="通知"></button>
        <div class="header-pill">管理中心<span class="header-chevron"></span></div>
        <div class="credit-pill"><span class="credit-dot"></span>融豆 <span id="creditCount">1280</span></div>
        <img class="avatar" src="assets/user-avatar.png" alt="">
      </div>
    </header>

    <main class="canvas-shell" id="canvasShell">
      <button class="return-btn" id="returnBtn" type="button" aria-label="返回上一页"><span class="return-icon" aria-hidden="true"></span>返回</button>
      <section class="canvas" aria-label="扩图编辑画布">
        <div class="board-strip" id="boardStrip">
          <div class="artboard-wrap" id="artboardWrap">
            <div class="selection-label">▣ 主图01</div>
            <div class="selection-size" id="selectionSize">2048 × 2730</div>
            <div class="artboard pending source-board" id="artboard" title="原始图片">
              <div class="expanded-bg"></div>
              <div class="outpaint-mask"></div>
              <div class="source-photo" id="sourcePhoto"></div>
              <div class="processing-badge">智能扩图中</div>
              <span class="handle lt"></span>
              <span class="handle rt"></span>
              <span class="handle lb"></span>
              <span class="handle rb"></span>
              <span class="handle tm"></span>
              <span class="handle bm"></span>
              <span class="handle lm"></span>
              <span class="handle rm"></span>
            </div>
          </div>
          <div id="resultSlot"></div>
        </div>
      </section>

      <aside class="outpaint-panel" id="outpaintPanel" aria-label="扩图参数">
        <h2>扩图</h2>
        <div class="form-block">
          <label class="form-label" for="scaleSelect">缩放比例</label>
          <div class="select-wrap">
            <select id="scaleSelect">
              <option value="1" selected>1x</option>
              <option value="1.5">1.5x</option>
              <option value="2">2x</option>
              <option value="3">3x</option>
              <option value="4">4x</option>
            </select>
          </div>
        </div>
        <div class="form-block">
          <div class="form-label">比例</div>
          <div class="ratio-list" id="ratioList" aria-label="比例">
            <button class="ratio-option" type="button" data-ratio="original"><span class="ratio-icon"><i></i></span><span>原始比例</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="1:1"><span class="ratio-icon"><i></i></span><span>1:1</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option active" type="button" data-ratio="3:4"><span class="ratio-icon"><i></i></span><span>3:4</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="2:3"><span class="ratio-icon"><i></i></span><span>2:3</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="9:16"><span class="ratio-icon"><i></i></span><span>9:16</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="4:3"><span class="ratio-icon"><i></i></span><span>4:3</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="3:2"><span class="ratio-icon"><i></i></span><span>3:2</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="16:9"><span class="ratio-icon"><i></i></span><span>16:9</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="4:5"><span class="ratio-icon"><i></i></span><span>4:5</span><span class="selected-mark">✓</span></button>
            <button class="ratio-option" type="button" data-ratio="5:4"><span class="ratio-icon"><i></i></span><span>5:4</span><span class="selected-mark">✓</span></button>
          </div>
        </div>
        <div class="form-block">
          <div class="form-label">大小</div>
          <div class="size-row">
            <label class="size-input"><span>W</span><input id="customWidth" type="number" min="512" max="4096" value="2048" aria-label="宽度"></label>
            <label class="size-input"><span>H</span><input id="customHeight" type="number" min="512" max="4096" value="2730" aria-label="高度"></label>
            <button class="ratio-lock active" type="button" id="ratioLockBtn" aria-pressed="true" title="锁定比例" aria-label="锁定比例"></button>
          </div>
        </div>
        <div class="panel-actions">
          <button class="btn" type="button" id="cancelBtn">取消</button>
          <button class="btn primary" type="button" id="generateBtn">生成 ⚡8</button>
        </div>
      </aside>

      <div class="right-rail" aria-label="快捷入口">
        <button class="rail-btn" type="button" title="翻译">文</button>
        <button class="rail-btn" type="button" title="工具">⌘</button>
        <button class="rail-btn active" type="button" title="AI">◔</button>
      </div>

      <div class="tool-dock" aria-label="底部工具">
        <button class="dock-btn" id="uploadImageBtn" type="button"><span class="dock-icon upload-dock-icon" aria-hidden="true"></span>上传图片</button>
        <button class="dock-btn" id="openOutpaintBtn" type="button"><span class="dock-icon outpaint-dock-icon" aria-hidden="true"></span>扩图</button>
        <button class="dock-btn" id="downloadImageBtn" type="button"><span class="download-dock-icon" aria-hidden="true"></span>下载</button>
      </div>
      <input id="localImageInput" type="file" accept="image/*" hidden>

      <div class="bottom-left">
        缩放比例：<span id="zoomLevel">100%</span>
      </div>

      <div class="floating-menu" id="resultMenu" role="menu">
        <button class="menu-item" type="button" data-action="download"><span class="menu-icon">⇩</span>下载图片</button>
        <button class="menu-item" type="button" data-action="continue"><span class="menu-icon">↗</span>继续扩图</button>
        <button class="menu-item" type="button" data-action="text"><span class="menu-icon">T</span>添加文字</button>
        <button class="menu-item" type="button" data-action="save"><span class="menu-icon">☆</span>保存到成品图片</button>
        <button class="menu-item" type="button" data-action="source"><span class="menu-icon">⌁</span>查看来源</button>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const source = { width: 2048, height: 2048 };
    const state = {
      ratio: "3:4",
      scale: 1,
      width: 2048,
      height: 2730,
      generated: false,
      locked: true,
      canvasScale: 1,
      canvasX: 0,
      canvasY: 0
    };

    const ratioList = document.getElementById("ratioList");
    const scaleSelect = document.getElementById("scaleSelect");
    const boardStrip = document.getElementById("boardStrip");
    const artboardWrap = document.getElementById("artboardWrap");
    const artboard = document.getElementById("artboard");
    const resultSlot = document.getElementById("resultSlot");
    const selectionSize = document.getElementById("selectionSize");
    const generateBtn = document.getElementById("generateBtn");
    const resultMenu = document.getElementById("resultMenu");
    const toast = document.getElementById("toast");
    const outpaintPanel = document.getElementById("outpaintPanel");
    const customWidth = document.getElementById("customWidth");
    const customHeight = document.getElementById("customHeight");
    const ratioLockBtn = document.getElementById("ratioLockBtn");
    const localImageInput = document.getElementById("localImageInput");
    const canvasShell = document.getElementById("canvasShell");
    const zoomLevel = document.getElementById("zoomLevel");
    const fixedUiSelector = ".outpaint-panel, .tool-dock, .right-rail, .floating-menu, .bottom-left, .return-btn";
    const dragState = {
      active: false,
      pointerId: null,
      startX: 0,
      startY: 0,
      originX: 0,
      originY: 0
    };

    function clamp(value) {
      return Math.max(512, Math.min(4096, Math.round(Number(value) || 1200)));
    }

    function exceedsSizeLimit(size) {
      return size.width > 4096 || size.height > 4096;
    }

    function presetSize(ratio, scale) {
      if (ratio === "original" || ratio === "1:1") {
        return { width: Math.round(source.width * scale), height: Math.round(source.height * scale) };
      }
      const [rw, rh] = ratio.split(":").map(Number);
      if (rw <= rh) {
        const width = Math.floor(source.width * scale);
        return { width, height: Math.floor(width * rh / rw) };
      }
      const height = Math.floor(source.height * scale);
      return { width: Math.floor(height * rw / rh), height };
    }

    function ratioValue(ratio) {
      if (ratio === "original" || ratio === "custom") return source.width / source.height;
      const [rw, rh] = ratio.split(":").map(Number);
      return rw / rh;
    }

    function render() {
      state.width = clamp(state.width);
      state.height = clamp(state.height);
      selectionSize.textContent = `${state.width} × ${state.height}`;
      customWidth.value = state.width;
      customHeight.value = state.height;
      ratioLockBtn.classList.toggle("active", state.locked);
      ratioLockBtn.setAttribute("aria-pressed", String(state.locked));
      artboardWrap.style.setProperty("--target-ratio", `${state.width} / ${state.height}`);
      document.documentElement.style.setProperty("--target-ratio", `${state.width} / ${state.height}`);

      const sourceWidthPercent = Math.min(94, Math.max(32, source.width / state.width * 100));
      document.documentElement.style.setProperty("--source-size", `${sourceWidthPercent}%`);

      const ratio = state.width / state.height;
      artboardWrap.classList.toggle("wide", ratio > 1.35);
      artboardWrap.classList.toggle("tall", ratio < .72);
      renderCanvasTransform();
    }

    function renderCanvasTransform() {
      boardStrip.style.transform = `translate(${state.canvasX}px, ${state.canvasY}px) scale(${state.canvasScale})`;
      zoomLevel.textContent = `${Math.round(state.canvasScale * 100)}%`;
    }

    function clampScale(value) {
      return Math.max(0.25, Math.min(4, value));
    }

    function zoomCanvas(delta, clientX, clientY) {
      const previousScale = state.canvasScale;
      const nextScale = clampScale(previousScale * delta);
      if (nextScale === previousScale) return;

      const shellRect = canvasShell.getBoundingClientRect();
      const centerX = shellRect.left + shellRect.width / 2;
      const centerY = shellRect.top + shellRect.height / 2;
      const focusX = clientX - centerX - state.canvasX;
      const focusY = clientY - centerY - state.canvasY;
      const scaleRatio = nextScale / previousScale;

      state.canvasX -= focusX * (scaleRatio - 1);
      state.canvasY -= focusY * (scaleRatio - 1);
      state.canvasScale = nextScale;
      renderCanvasTransform();
    }

    function panCanvas(deltaX, deltaY) {
      state.canvasX -= deltaX;
      state.canvasY -= deltaY;
      renderCanvasTransform();
    }

    function isFixedUiTarget(target) {
      return Boolean(target && target.closest(fixedUiSelector));
    }

    function updateFromRatio(ratio) {
      const nextScale = Number(scaleSelect.value);
      const next = presetSize(ratio, nextScale);
      if (exceedsSizeLimit(next)) {
        scaleSelect.value = String(state.scale);
        showToast("最终尺寸超出扩图限制");
        return false;
      }
      state.ratio = ratio;
      state.scale = nextScale;
      state.width = next.width;
      state.height = next.height;
      ratioList.querySelectorAll(".ratio-option").forEach(button => {
        button.classList.toggle("active", button.dataset.ratio === ratio);
      });
      resetGenerated();
      render();
      return true;
    }

    function markCustomSize() {
      state.ratio = "custom";
      ratioList.querySelectorAll(".ratio-option").forEach(button => button.classList.remove("active"));
    }

    function updateCustomSize(changedField) {
      const currentAspect = state.ratio === "custom"
        ? state.width / state.height
        : ratioValue(state.ratio);
      if (changedField === "width") {
        const nextWidth = clamp(customWidth.value);
        state.width = nextWidth;
        if (state.locked) {
          state.height = clamp(nextWidth / currentAspect);
        } else {
          state.height = clamp(customHeight.value);
          markCustomSize();
        }
      } else {
        const nextHeight = clamp(customHeight.value);
        state.height = nextHeight;
        if (state.locked) {
          state.width = clamp(nextHeight * currentAspect);
        } else {
          state.width = clamp(customWidth.value);
          markCustomSize();
        }
      }
      resetGenerated();
      render();
    }

    function resetGenerated() {
      state.generated = false;
      artboard.classList.remove("generated", "processing");
      artboard.classList.add("pending");
      resultSlot.innerHTML = "";
      generateBtn.disabled = false;
      generateBtn.textContent = "生成 ⚡8";
      resultMenu.classList.remove("show");
    }

    function createResultBoard() {
      resultSlot.innerHTML = `
        <div class="artboard-wrap result-wrap">
          <div class="selection-label">▣ 扩图结果</div>
          <div class="selection-size">${state.width} × ${state.height}</div>
          <div class="artboard generated result-board" id="resultArtboard" title="生成完成后右键图片查看操作">
            <div class="expanded-bg"></div>
            <div class="outpaint-mask"></div>
            <div class="source-photo"></div>
            <span class="handle lt"></span>
            <span class="handle rt"></span>
            <span class="handle lb"></span>
            <span class="handle rb"></span>
            <span class="handle tm"></span>
            <span class="handle bm"></span>
            <span class="handle lm"></span>
            <span class="handle rm"></span>
          </div>
        </div>
      `;
      const resultWrap = resultSlot.querySelector(".result-wrap");
      const ratio = state.width / state.height;
      resultWrap.style.setProperty("--target-ratio", `${state.width} / ${state.height}`);
      resultWrap.classList.toggle("wide", ratio > 1.35);
      resultWrap.classList.toggle("tall", ratio < .72);
      bindResultContextMenu();
    }

    function bindResultContextMenu() {
      const resultArtboard = document.getElementById("resultArtboard");
      if (!resultArtboard) return;
      resultArtboard.addEventListener("contextmenu", placeMenu);
      resultArtboard.addEventListener("mousedown", (event) => {
        if (event.button === 2) placeMenu(event);
      });
      resultArtboard.addEventListener("auxclick", (event) => {
        if (event.button === 2) placeMenu(event);
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function generate() {
      resultMenu.classList.remove("show");
      generateBtn.disabled = true;
      generateBtn.textContent = "生成中";
      artboard.classList.remove("generated", "pending");
      artboard.classList.add("processing");
      document.getElementById("creditCount").textContent = "1272";
      window.setTimeout(() => {
        state.generated = true;
        artboard.classList.remove("processing", "pending");
        artboard.classList.add("generated");
        createResultBoard();
        generateBtn.disabled = false;
        generateBtn.textContent = "重新生成 ⚡8";
        render();
        showToast("扩图完成：已生成新图片并关联原始图片。右键图片可操作。");
      }, 1500);
    }

    function placeMenu(event) {
      if (!state.generated) {
        showToast("请先生成扩图结果，完成后可右键操作图片。");
        return;
      }
      event.preventDefault();
      const shellRect = document.getElementById("canvasShell").getBoundingClientRect();
      const menuWidth = 236;
      const menuHeight = 228;
      const x = Math.min(event.clientX - shellRect.left, shellRect.width - menuWidth - 20);
      const y = Math.min(event.clientY - shellRect.top, shellRect.height - menuHeight - 20);
      resultMenu.style.left = `${Math.max(20, x)}px`;
      resultMenu.style.top = `${Math.max(20, y)}px`;
      resultMenu.classList.add("show");
    }

    ratioList.addEventListener("click", (event) => {
      const button = event.target.closest(".ratio-option");
      if (!button) return;
      updateFromRatio(button.dataset.ratio);
    });
    scaleSelect.addEventListener("change", () => {
      if (state.ratio === "custom") {
        const nextScale = Number(scaleSelect.value);
        const next = presetSize("original", nextScale);
        if (exceedsSizeLimit(next)) {
          scaleSelect.value = String(state.scale);
          showToast("最终尺寸超出扩图限制");
          return;
        }
        state.scale = nextScale;
        resetGenerated();
        return;
      }
      updateFromRatio(state.ratio);
    });
    customWidth.addEventListener("input", () => updateCustomSize("width"));
    customHeight.addEventListener("input", () => updateCustomSize("height"));
    ratioLockBtn.addEventListener("click", () => {
      state.locked = !state.locked;
      render();
    });
    generateBtn.addEventListener("click", generate);
    document.getElementById("cancelBtn").addEventListener("click", () => {
      outpaintPanel.classList.remove("show");
      document.getElementById("openOutpaintBtn").classList.remove("active");
      showToast("已取消扩图设置。");
    });
    document.getElementById("openOutpaintBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      outpaintPanel.classList.toggle("show");
      const isOpen = outpaintPanel.classList.contains("show");
      document.getElementById("openOutpaintBtn").classList.toggle("active", isOpen);
    });
    document.getElementById("uploadImageBtn").addEventListener("click", () => {
      outpaintPanel.classList.remove("show");
      document.getElementById("openOutpaintBtn").classList.remove("active");
      localImageInput.click();
    });
    document.getElementById("downloadImageBtn").addEventListener("click", () => {
      resultMenu.classList.remove("show");
      showToast("下载当前图片");
    });
    document.getElementById("returnBtn").addEventListener("click", () => {
      window.location.href = "history.html";
    });
    localImageInput.addEventListener("change", () => {
      const file = localImageInput.files && localImageInput.files[0];
      if (!file) return;
      if (!file.type.startsWith("image/")) {
        showToast("请选择图片文件。");
        localImageInput.value = "";
        return;
      }
      const imageUrl = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        let exceededOnUpload = false;
        document.documentElement.style.setProperty("--source-image", `url("${imageUrl}")`);
        if (img.naturalWidth && img.naturalHeight) {
          source.width = img.naturalWidth;
          source.height = img.naturalHeight;
          if (state.ratio === "custom") {
            state.width = source.width;
            state.height = source.height;
          } else {
            let next = presetSize(state.ratio, Number(scaleSelect.value));
            if (exceedsSizeLimit(next)) {
              scaleSelect.value = "1";
              state.scale = 1;
              next = presetSize(state.ratio, state.scale);
              exceededOnUpload = true;
            }
            state.width = next.width;
            state.height = next.height;
          }
        }
        resetGenerated();
        render();
        showToast(exceededOnUpload ? "最终尺寸超出扩图限制" : `已上传：${file.name}`);
      };
      img.onerror = () => {
        showToast("图片加载失败，请重新选择。");
      };
      img.src = imageUrl;
      localImageInput.value = "";
    });
    canvasShell.addEventListener("wheel", (event) => {
      if (isFixedUiTarget(event.target)) return;
      event.preventDefault();
      if (event.ctrlKey || event.metaKey) {
        const delta = Math.exp(-event.deltaY * 0.002);
        zoomCanvas(delta, event.clientX, event.clientY);
        return;
      }
      panCanvas(event.deltaX, event.deltaY);
    }, { passive: false });
    canvasShell.addEventListener("gesturechange", (event) => {
      if (isFixedUiTarget(event.target)) return;
      event.preventDefault();
      zoomCanvas(event.scale > 1 ? 1.04 : 0.96, event.clientX, event.clientY);
    }, { passive: false });
    boardStrip.addEventListener("pointerdown", (event) => {
      if (event.button !== 0 || isFixedUiTarget(event.target) || event.target.closest("button, input, select")) return;
      dragState.active = true;
      dragState.pointerId = event.pointerId;
      dragState.startX = event.clientX;
      dragState.startY = event.clientY;
      dragState.originX = state.canvasX;
      dragState.originY = state.canvasY;
      boardStrip.classList.add("dragging");
      boardStrip.setPointerCapture(event.pointerId);
    });
    boardStrip.addEventListener("pointermove", (event) => {
      if (!dragState.active || event.pointerId !== dragState.pointerId) return;
      state.canvasX = dragState.originX + event.clientX - dragState.startX;
      state.canvasY = dragState.originY + event.clientY - dragState.startY;
      renderCanvasTransform();
    });
    function endDrag(event) {
      if (!dragState.active || event.pointerId !== dragState.pointerId) return;
      dragState.active = false;
      dragState.pointerId = null;
      boardStrip.classList.remove("dragging");
      try {
        boardStrip.releasePointerCapture(event.pointerId);
      } catch (error) {}
    }
    boardStrip.addEventListener("pointerup", endDrag);
    boardStrip.addEventListener("pointercancel", endDrag);
    window.addEventListener("contextmenu", (event) => {
      const resultArtboard = document.getElementById("resultArtboard");
      if (resultArtboard && resultArtboard.contains(event.target)) placeMenu(event);
    }, true);
    window.__openResultMenu = placeMenu;
    document.addEventListener("click", (event) => {
      if (!resultMenu.contains(event.target)) resultMenu.classList.remove("show");
    });
    resultMenu.addEventListener("click", (event) => {
      const item = event.target.closest("[data-action]");
      if (!item) return;
      const map = {
        download: "下载图片",
        continue: "基于当前结果继续扩图",
        text: "进入添加文字",
        save: "保存到成品图片",
        source: "查看来源：自由生图结果"
      };
      resultMenu.classList.remove("show");
      showToast(map[item.dataset.action]);
    });

    const entrySource = new URLSearchParams(window.location.search).get("source");
    if (entrySource === "free-create-output") {
      document.documentElement.style.setProperty("--source-image", 'url("assets/product-cover-04.png")');
      source.width = 1024;
      source.height = 1024;
      const next = presetSize(state.ratio, Number(scaleSelect.value));
      state.width = next.width;
      state.height = next.height;
      resetGenerated();
    }

    render();
  </script>
</body>
</html>
